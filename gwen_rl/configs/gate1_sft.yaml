# Gate 1: SFT Continuation
# Optimized for 4GB VRAM (RTX A1000 Laptop)
#
# Prerequisites:
#   1. python -m gwen_rl.scripts.build_manifest --csv data/metadata.csv ...
#   2. python -m gwen_rl.scripts.encode_codec      ← encode audio → real codec tokens
#   3. python -m gwen_rl.scripts.train_sft --config gwen_rl/configs/gate1_sft.yaml

model_id: "g-group-ai-lab/gwen-tts-0.6B"

# LoRA config
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# Data paths
train_path: "data/processed/train.pt"
val_path:   "data/processed/val.pt"
save_dir:   "checkpoints/gate1"
log_dir:    "logs"

# Optimizer
lr: 2.0e-5           # Lower LR for stability near convergence
beta_kl: 0.01        # Re-enabled: KL anchor prevents the model from breaking its base patterns
grad_clip: 1.0
warmup_steps: 200    # Longer warmup to prevent shock

# Batch (4GB VRAM: batch=1, accum=8 → effective batch=8)
batch_size: 1
gradient_accum_steps: 8
max_seq_len: 160     # Increased slightly (12.8s) to cover more audio context

# Training schedule
max_steps: 100000
val_every: 200        # validate every 200 steps
save_every: 1000
early_stop_patience: 50  # generous patience — model now converges properly
